<title>DopCar ENCOR · v.carotida-11.10.2 · Dr. Genius Costa</title>

<style>
/* ═══════════════════════════════════════════════════════════════════
   Sistema_Laudos_Doppler_de_carótidas
   ═══════════════════════════════════════════════════════════════════ */
:root{
  /* Dark theme tokens — copied verbatim from eco system */
  --bg:#0e1116; --panel:#161d26; --panel2:#1d2630; --line:#2a3642;
  --ink:#e8edf2; --dim:#9aa9b8; --accent:#3fb6a8; --accent-d:#2a8478;
  --warn:#e8554e; --warn-bg:#2a1614; --calc:#7aa2c8; --hdr:#0b0f14;
  --chip:#222e3a; --chip-on:#2a8478; --chip-on-ink:#eafffb;
  --ok:#3fb672; --ok-d:#2a8456;
  --er:#e8554e; --er-d:#a02020;
  --wn:#e6a830;
  /* Stenosis map colors */
  --mc-normal:#5a6975; --mc-placa:#e6a830; --mc-estenose:#e67e22;
  --mc-oclusao:#e8554e; --mc-stent:#5b8fb9; --mc-restenose:#a072c9;
  --mc-hover:#3fb6a8;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,'Cascadia Code','Consolas',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:13px;overflow:hidden}
input,select,textarea,button{font-family:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}

/* ═══════════ TOPBAR (eco-style: brand badge, title, version tag, then buttons) ═══════════ */
.topbar{
  background:var(--hdr);border-bottom:1px solid var(--line);padding:8px 16px;
  display:flex;align-items:center;gap:12px;flex:0 0 auto;height:48px;
}
.tb-brand{
  display:inline-block;padding:3px 10px;border-radius:12px;
  background:#a02020;color:#fff;font-size:9pt;font-weight:600;letter-spacing:.5px;
}
.tb-title{font-size:14px;font-weight:600;letter-spacing:.3px;color:var(--ink)}
.tb-sub{color:var(--dim);font-weight:400;font-size:12.5px;margin-left:4px}
.tb-tag{
  font-family:var(--mono);font-size:11px;color:var(--accent);
  border:1px solid var(--accent-d);padding:2px 7px;border-radius:4px;
}
.tb-sp{margin-left:auto}
.tb-btn{
  background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;transition:border-color .15s;
}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.primary{background:var(--accent-d);border-color:var(--accent-d);color:#fff}
.tb-btn.primary:hover{background:var(--accent);border-color:var(--accent)}
.tb-btn.active-folder{border-color:var(--accent);color:var(--accent);background:rgba(255,255,255,.04)}
.tb-zoom{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
.tb-zoom button{background:transparent;border:none;color:var(--dim);padding:4px 12px;font-size:14px;font-weight:600;cursor:pointer;border-right:1px solid var(--line)}
.tb-zoom button:last-child{border-right:none}
.tb-zoom button:hover{background:rgba(255,255,255,.04);color:var(--ink)}

/* ═══════════ APP LAYOUT (grid 1fr 1fr like eco) ═══════════ */
.app{display:flex;flex-direction:column;height:100vh}
.main{flex:1 1 auto;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}

/* ═══════════ EDITOR PANE (left) ═══════════ */
.editor{
  overflow-y:auto;border-right:1px solid var(--line);background:var(--panel);
  display:flex;flex-direction:column;
}

/* TABS — eco style: sticky top, teal underline */
.tabs{
  display:flex;position:sticky;top:0;background:var(--hdr);z-index:5;
  border-bottom:1px solid var(--line);overflow-x:auto;
}
.tabs::-webkit-scrollbar{display:none}
.tabs button{
  flex:1;min-width:fit-content;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--dim);
  padding:11px 8px;font-size:12px;cursor:pointer;font-weight:600;letter-spacing:.3px;
  white-space:nowrap;transition:color .15s,border-color .15s;
}
.tabs button:hover{color:var(--ink)}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-pane{display:none;padding:14px;overflow-y:auto;flex:1}
.tab-pane.active{display:block}

/* FORM FIELDS — eco style */
.fg{margin-bottom:11px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fi,.fs,.fta{
  width:100%;padding:6px 9px;background:var(--panel2);
  border:1px solid var(--line);color:var(--ink);border-radius:5px;
  font-size:13px;outline:none;transition:border-color .15s;
}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent)}
.fi.uc{text-transform:uppercase}
.fta{resize:vertical}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--dim);font-size:10px}
.sw .fs{padding-right:22px}

/* Checkboxes for FRs */
.cb-row{display:flex;flex-wrap:wrap;gap:7px 14px;margin-bottom:11px}
.cb-row label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;color:var(--ink)}
.cb-row input[type="checkbox"]{accent-color:var(--accent)}

/* Section headers */
.sh{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--accent);padding:9px 0 4px;border-bottom:1px solid var(--line);
  margin-bottom:8px;
}

/* ═══════════ VELOCIDADES TABLE ═══════════ */
.vtab{width:100%;border-collapse:collapse;margin-bottom:10px;background:var(--panel)}
.vtab th{
  font-size:10px;font-weight:700;text-align:center;padding:6px 4px;
  background:var(--hdr);color:var(--ink);border:1px solid var(--line);letter-spacing:.4px;
}
.vtab th.seg{text-align:left;background:var(--accent-d);width:50px;color:#fff}
.vtab td{padding:3px 4px;border:1px solid var(--line);text-align:center;vertical-align:middle;background:var(--panel2)}
.vtab td.seg{font-size:11.5px;font-weight:700;text-align:left;background:var(--panel);color:var(--ink)}
.vtab .side-hdr td{
  background:var(--accent-d);color:#fff;font-weight:700;font-size:11px;
  text-align:center;letter-spacing:.5px;padding:5px;
}
/* Inputs in vtab (eco .mm style) */
.vi{
  width:100%;padding:4px 7px;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);border-radius:4px;font-size:12.5px;text-align:right;outline:none;
  font-variant-numeric:tabular-nums;transition:border-color .15s;
}
.vi:focus{border-color:var(--accent)}
.vi.ac{background:rgba(122,162,200,.1);color:var(--calc);font-style:italic;cursor:not-allowed}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle;background:var(--line)}
.dok{background:var(--ok)} .dwn{background:var(--wn)} .derr{background:var(--er)} .dem{background:var(--line)}
.dir-sel{
  width:100%;padding:4px 7px;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);border-radius:4px;font-size:12.5px;outline:none;
}
.dir-sel:focus{border-color:var(--accent)}

/* ═══════════ MAPA VASCULAR ═══════════ */
.mapa-wrap{display:flex;gap:12px}
#svgmap{flex-shrink:0;border-radius:6px;background:var(--panel2);border:1px solid var(--line)}
#seg-panel-wrap{flex:1}
#seg-panel{
  background:var(--panel2);border:1px solid var(--line);border-radius:6px;
  padding:10px;min-height:200px;overflow-y:auto;
}
#seg-panel-empty{color:var(--dim);font-size:12px;text-align:center;padding:30px 10px}
.seg-panel-title{font-size:12.5px;font-weight:700;color:var(--accent);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.cdot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px;flex-shrink:0}
.leg-wrap{display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:10px;padding:7px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:5px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink)}

/* Achado card */
.ach-card{border:1px solid var(--line);border-radius:5px;margin-bottom:6px;overflow:hidden;background:var(--panel)}
.ach-hdr{display:flex;align-items:center;padding:6px 9px;background:var(--panel2);gap:7px;cursor:pointer}
.ach-hdr:hover{background:#243140}
.ach-hdr-lbl{font-size:11.5px;font-weight:600;flex:1;color:var(--ink)}
.ach-del{font-size:13px;color:var(--dim);padding:1px 5px;border-radius:3px}
.ach-del:hover{background:var(--warn-bg);color:var(--er)}
.ach-body{padding:9px;display:none}
.ach-body.on{display:block}
.far{display:flex;gap:6px;margin-top:9px}
.fsel{
  flex:1;padding:5px 8px;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:5px;font-size:11.5px;outline:none;
}
.fsel:focus{border-color:var(--accent)}
.badd{
  padding:5px 10px;border-radius:5px;border:1px solid var(--accent);
  background:var(--accent-d);color:#fff;font-size:11.5px;font-weight:600;transition:all .15s;
}
.badd:hover{background:var(--accent)}
.pf{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.pf-full{grid-column:1/-1}
.pfl{font-size:9.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.pfi{
  width:100%;padding:4px 6px;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:4px;font-size:11.5px;outline:none;
}
.pfi:focus{border-color:var(--accent)}

/* ═══════════ DESCRIPTION ═══════════ */
.desc-seg{border:1px solid var(--line);border-radius:6px;margin-bottom:7px;overflow:hidden;background:var(--panel)}
.desc-shd{
  display:flex;align-items:center;padding:8px 10px;background:var(--panel2);
  cursor:pointer;transition:background .12s;gap:7px;
}
.desc-shd:hover{background:#243140}
.desc-shd.on{background:#243140;border-bottom:1px solid var(--line)}
.desc-sht{font-size:12px;font-weight:600;color:var(--ink);flex:1}
.desc-sbg{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--accent-d);color:#fff}
.desc-sbg.w{background:var(--wn);color:var(--hdr)}
.desc-sar{font-size:10px;color:var(--dim);transition:transform .15s}
.desc-shd.on .desc-sar{transform:rotate(180deg)}
.desc-body{display:none;padding:9px 10px}
.desc-body.on{display:block}
.auto-ph,.norm-ph{display:flex;gap:6px;padding:7px 9px;border-radius:4px;margin-bottom:6px;border:1px solid}
.auto-ph{background:rgba(63,182,168,.08);border-color:var(--accent-d)}
.norm-ph{background:rgba(63,182,114,.08);border-color:var(--ok-d)}
.auto-tag,.norm-tag{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;align-self:flex-start;margin-top:1px;white-space:nowrap;flex-shrink:0;color:#fff}
.auto-tag{background:var(--accent)}
.norm-tag{background:var(--ok)}
.auto-txt,.norm-txt{font-size:11.5px;color:var(--ink);line-height:1.55;flex:1}
.ovr-ta{
  width:100%;padding:6px 8px;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:4px;font-size:11.5px;resize:vertical;
  min-height:54px;line-height:1.55;outline:none;margin-bottom:5px;
}
.ovr-ta:focus{border-color:var(--accent)}
.ovr-btn{
  font-size:10.5px;color:var(--accent);background:transparent;
  border:1px solid var(--accent-d);border-radius:4px;padding:3px 9px;
  cursor:pointer;transition:all .15s;display:inline-block;margin-bottom:5px;
}
.ovr-btn:hover{background:var(--accent-d);color:#fff}
.fc{border:1px solid var(--line);border-radius:5px;padding:7px 9px;margin-top:6px;background:var(--panel2)}
.fch{display:flex;align-items:center;margin-bottom:5px}
.fcl{font-size:9.5px;font-weight:700;text-transform:uppercase;color:var(--accent);flex:1;letter-spacing:.4px}
.bdel{padding:2px 6px;border-radius:3px;font-size:12px;color:var(--dim)}
.bdel:hover{background:var(--warn-bg);color:var(--er)}
.fta-sub{
  width:100%;padding:5px 7px;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);border-radius:4px;font-size:11.5px;resize:vertical;min-height:44px;
  line-height:1.5;outline:none;margin-bottom:4px;
}
.fta-sub:focus{border-color:var(--accent)}
.fsl{font-size:9px;color:var(--dim);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

/* ═══════════ CONCLUSION TAB ═══════════ */
.concl-auto{
  background:var(--panel2);border:1px solid var(--line);border-radius:5px;
  padding:11px 13px;margin-bottom:10px;font-size:11.5px;line-height:1.65;
  color:var(--ink);min-height:64px;
}
.concl-auto p{margin-bottom:4px}
.concl-auto p:last-child{margin-bottom:0}
.concl-edit{
  width:100%;padding:9px;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:5px;font-size:11.5px;resize:vertical;min-height:120px;
  outline:none;line-height:1.6;font-family:var(--font);
}
.concl-edit:focus{border-color:var(--accent)}
/* Chips de placa na conclusão */
.chip-side{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.chip-side-lbl{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.chip-side-btn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:4px 12px;border-radius:14px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s}
.chip-side-btn:hover{border-color:var(--accent);color:var(--ink)}
.chip-side-btn.active{background:var(--accent-d);border-color:var(--accent-d);color:#fff}
.chip-grp{margin-bottom:7px}
.chip-grp-lbl{font-size:9.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--chip);border:1px solid var(--line);color:var(--ink);padding:5px 11px;border-radius:14px;font-size:11.5px;cursor:pointer;transition:all .15s;text-align:left;line-height:1.25}
.chip:hover{border-color:var(--accent);background:#243140}
.chip .chip-tag{display:inline-block;font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:8px;margin-right:5px;background:var(--accent-d);color:#fff;vertical-align:middle}
.chip .chip-tag.calc{background:var(--wn);color:var(--hdr)}
.concl-ctrl{display:flex;gap:6px;align-items:center;margin-bottom:9px}
.mic-btn{cursor:pointer;line-height:1}
.mic-btn.rec{background:var(--er)!important;border-color:var(--er)!important;color:#fff!important;animation:micpulse 1s infinite}
@keyframes micpulse{0%,100%{opacity:1}50%{opacity:.5}}
.no-voice .mic-btn{display:none}
.concl-ctrl-lbl{font-size:11px;font-weight:600;color:var(--dim);flex:1;text-transform:uppercase;letter-spacing:.4px}

/* ═══════════ BANCO ═══════════ */
.bank-search{
  width:100%;padding:8px 10px;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:5px;outline:none;font-size:12.5px;margin-bottom:10px;
}
.bank-search:focus{border-color:var(--accent)}
.brec{

/* A4 pages — full-page ENCOR timbrado as background, content overlaid */
#a4{

  font-family:'Times New Roman',Times,serif;font-size:10pt;line-height:1.55;

/* Full-page timbrado image (real <img> for reliable Chrome printing / html2canvas) */
.a4-bg{position:absolute;top:0;left:0;width:100%;height:auto;z-index:0;display:block;pointer-events:none}

.a4-body{position:relative;z-index:1;height:1123px;min-height:1123px;overflow:hidden;padding:138px 80px 56px;display:flex;flex-direction:column}

.a4-fit{transform-origin:top left;width:100%;flex:0 0 auto}

.ptbl{width:100%;border-collapse:collapse;font-family:'Segoe UI',Arial,sans-serif}

.pvt .ok{color:#111} .pvt .wn{color:#111} .pvt .er{color:#111} .pvt .em{color:#777}

<script>
'use strict';
/* ╔══════════════════════════════════════════════════════════╗
   ║  RULES ENGINE — única fonte de verdade clínica          ║
   ║  Referências: IAC/SVU > SRU > ESVS > SBACV/CBR         ║
   ║  Dr. Genius Costa CRM-BA 23913 · v.carotida-02         ║
   ╚══════════════════════════════════════════════════════════╝ */

/* ── IAC/SVU Stenosis Criteria ──────────────────────────────
   Source: IAC Vascular Testing Standards / SVU Clinical Practice Guidelines
   Carotid Duplex Ultrasound
   
   v.carotida-02: IAC/SVU adopted as primary reference per prompt mestre
   Note: Requires plaque presence info for <50% vs Normal distinction  */
const RE = {
  // Classify ICA stenosis per IAC/SVU
  // Returns: {grade, label, css}
  stenoseACI(psv, edv, ratio, hasPlaca, manual) {
    // Override manual tem prioridade absoluta
    if (manual === 'suboclusao') return { grade:'suboclusao', label:'Suboclusão', css:'er' };
    if (manual === 'oclusao')    return { grade:'oclusao',    label:'Oclusão',    css:'er' };

    // Critérios IAC (modificação do consenso SRU) — IAC Vascular Testing, nov/2023
    // Tabela: Normal/<50% PSV<180; 50–69% PSV 180–230; ≥70% PSV>230. Razão e EDV como parâmetros adicionais.
    // ≥70% (aquém de pré-oclusão): PSV >230  OU  razão ICA/CCA >4,0  OU  EDV >100
    if ((!isNaN(psv) && psv > 230) ||
        (!isNaN(ratio) && ratio > 4.0) ||
        (!isNaN(edv) && edv > 100))
      return { grade:'gte70', label:'≥70%', css:'er' };

    // 50–69%: PSV 180–230 (primário)  OU  PSV 125–180 com razão ICA/CCA ≥2,0 (nota IAC)
    if ((!isNaN(psv) && psv >= 180 && psv <= 230) ||
        (!isNaN(psv) && psv >= 125 && psv < 180 && !isNaN(ratio) && ratio >= 2.0))
      return { grade:'50_69', label:'50–69%', css:'wn' };

    // <50%: PSV <180 COM placa (e sem critérios acima)
    if (!isNaN(psv) && psv < 180 && hasPlaca)
      return { grade:'lt50', label:'<50%', css:'wn' };

    // Normal: PSV <180 SEM placa
    if (!isNaN(psv) && psv < 180 && !hasPlaca)
      return { grade:'normal', label:'Normal', css:'ok' };

    return null; // sem dados suficientes
  },

  // EMI (espessura médio-intimal) classification — 4 faixas
  //  < 0,9 mm           → Normal
  //  0,9–1,2 mm         → Espessamento médio-intimal
  //  1,2–1,5 mm         → Espessamento médio-intimal focal
  //  > 1,5 mm           → Placa aterosclerótica (por definição)
  classIMT(imt) {
    if (isNaN(imt) || imt === null) return null;
    if (imt < 0.9)  return { grade:'normal', label:'Normal',                              css:'ok' };
    if (imt < 1.2)  return { grade:'espes',  label:'Espessamento médio-intimal',          css:'wn' };
    if (imt <= 1.5) return { grade:'focal',  label:'Espessamento médio-intimal focal',    css:'wn' };
    return            { grade:'placa',  label:'Placa aterosclerótica',                css:'er' };
  },

  // Vertebral classification
  classVert(fluxo) {
    const m = {
      'anterogrado':  { grade:'normal',   label:'Normal', css:'ok' },
      'alternante':   { grade:'parcial',  label:'Suspeita/Roubo parcial', css:'wn' },
      'retrogrado':   { grade:'completo', label:'Roubo completo da subclávia', css:'er' },
    };
    return m[fluxo] || null;
  },

  /* DESCRIPTION ENGINE — generates text from structured data */
  descACC(side, data) {
    const sl = side === 'd' ? 'direita' : 'esquerda';
    const imt = parseFloat(data.imt);
    const psv = parseFloat(data.psv);
    const edv = parseFloat(data.edv);

    // Compose velocity part
    let velPart = '';
    if (!isNaN(psv) || !isNaN(edv)) {
      const vels = [];
      if (!isNaN(psv)) vels.push(`velocidade de pico sistólico de ${psv} cm/s`);
      if (!isNaN(edv)) vels.push(`velocidade diastólica final de ${edv} cm/s`);
      velPart = `. A velocimetria Doppler demonstra fluxo laminar com ${vels.join(', ')} e morfologia de curva espectral bifásica`;
    }

    // EMI (espessura médio-intimal)
    const imtClass = RE.classIMT(imt);
    let imtPart = ', com espessura das paredes preservada';
    if (imtClass) {
      if (imtClass.grade === 'normal')
        imtPart = `, com espessura médio-intimal de ${imt.toFixed(1)} mm (normal)`;
      else if (imtClass.grade === 'placa')
        imtPart = `, com espessura médio-intimal de ${imt.toFixed(1)} mm — medida superior a 1,5 mm, caracterizando placa aterosclerótica`;
      else
        imtPart = `, com espessura médio-intimal de ${imt.toFixed(1)} mm (${imtClass.label.toLowerCase()})`;
    }

    // Plaque presence
    const placas = (data.achados || []).filter(a => a.tipo === 'placa');
    let placaPart = ', sem ateromatose significativa';
    if (placas.length > 0) {
      placaPart = '. ' + placas.map(p => RE.descPlaca(p)).join(' ');
    }

    return `Artéria carótida comum ${sl} de calibre normal${imtPart}${placaPart}${velPart}.`;
  },

  descBIF(side, data) {
    const sl = side === 'd' ? 'direita' : 'esquerda';
    const placas = (data.achados || []).filter(a => a.tipo === 'placa');
    if (placas.length === 0)
      return `Bifurcação carotídea ${sl} de calibre normal, paredes regulares e sem ateromatose significativa, apresentando zona de turbilhonamento de fluxo (padrão normal).`;
    return `Bifurcação carotídea ${sl} com ${placas.map(p => RE.descPlaca(p)).join(' ')} Turbilhonamento de fluxo ao Doppler colorido.`;
  },

  descACI(side, data) {
    const sl  = side === 'd' ? 'direita' : 'esquerda';
    const psv = parseFloat(data.psv);
    const edv = parseFloat(data.edv);
    const ratio = parseFloat(data.ratio);
    const hasPlaca = (data.achados || []).some(a => a.tipo === 'placa');
    const manual = data.manualStatus;
    const steno = RE.stenoseACI(psv, edv, ratio, hasPlaca, manual);
    const placas = (data.achados || []).filter(a => a.tipo === 'placa');

    if (manual === 'oclusao')
      return `Artéria carótida interna ${sl} sem sinal de fluxo ao Doppler colorido e pulsado, compatível com oclusão total.`;

    if (manual === 'suboclusao')
      return `Artéria carótida interna ${sl} com achados compatíveis com suboclusão ao estudo hemodinâmico e morfológico.`;

    const velPart = [];
    if (!isNaN(psv)) velPart.push(`VPS ${psv} cm/s`);
    if (!isNaN(edv)) velPart.push(`VDF ${edv} cm/s`);
    if (!isNaN(ratio)) velPart.push(`razão ACI/ACC ${Number(ratio).toFixed(2)}`);
    const velStr = velPart.length ? ` (${velPart.join(', ')})` : '';

    let placaStr = placas.length ? ' ' + placas.map(p => RE.descPlaca(p)).join(' ') : '';

    if (!steno) return `Artéria carótida interna ${sl} sem evidência de estenose hemodinamicamente significativa ao Doppler.`;

    if (steno.grade === 'normal')
      return `Artéria carótida interna ${sl} de calibre normal, com espessura preservada das paredes, sem ateromatose significativa. A velocimetria Doppler demonstra fluxo laminar com velocidade normal e morfologia de curva espectral bifásica.`;

    if (steno.grade === 'lt50') {
      // v.carotida-02 patch LIM-01: avoid 'calibre normal' contradiction when plaques present
      const opener = placas.length
        ? `Artéria carótida interna ${sl} com ateromatose parietal${velStr}`
        : `Artéria carótida interna ${sl} de calibre normal${velStr}`;
      return `${opener}.${placaStr} Sem critérios hemodinâmicos de estenose significativa (critérios IAC, SRU modificado) — estenose estimada <50%.`;
    }

    if (steno.grade === '50_69')
      return `Artéria carótida interna ${sl} com velocidades compatíveis com estenose moderada de 50–69% pelos critérios IAC (SRU modificado)${velStr}.${placaStr} Turbilhonamento ao Doppler colorido com padrão espectral turbulento no segmento de maior aceleração.`;

    // ≥70%
    return `Artéria carótida interna ${sl} com velocidades compatíveis com estenose grave (≥70%, suboclusiva) pelos critérios IAC (SRU modificado)${velStr}.${placaStr} Turbilhonamento acentuado ao Doppler colorido com padrão espectral pós-estenótico.`;
  },

  descACE(side, data) {
    const sl = side === 'd' ? 'direita' : 'esquerda';
    const psv = parseFloat(data.psv);
    const placas = (data.achados || []).filter(a => a.tipo === 'placa');
    const psvStr = !isNaN(psv) ? ` (VPS ${psv} cm/s)` : '';
    const inRange = isNaN(psv) || (psv >= 70 && psv <= 130);
    if (inRange && placas.length === 0)
      return `Artéria carótida externa ${sl} de calibre normal, sem tortuosidades, não se identificando ateromatose com repercussão hemodinâmica. A velocimetria Doppler demonstra fluxo laminar com velocidade normal e morfologia de curva espectral trifásica.`;
    return `Artéria carótida externa ${sl} de calibre normal${psvStr}. ${placas.map(p => RE.descPlaca(p)).join(' ')}`;
  },

  descAV(side, data) {
    const sl = side === 'd' ? 'direita' : 'esquerda';
    const psv = parseFloat(data.psv);
    const diam = parseFloat(data.diam);
    const fluxo = data.fluxo || 'anterogrado';
    const vClass = RE.classVert(fluxo);
    const diamStr = !isNaN(diam) ? ` (diâmetro ${diam.toFixed(1)} mm)` : '';
    const psvStr = !isNaN(psv) ? `, VPS ${psv} cm/s` : '';

    if (!vClass || vClass.grade === 'normal')
      return `Artéria vertebral ${sl} de calibre normal, sem tortuosidades, com origem bem visualizada e sem lesões. A velocimetria Doppler demonstra fluxo laminar com velocidade normal e morfologia de curva espectral preservada.`;

    if (vClass.grade === 'parcial')
      return `Artéria vertebral ${sl}${diamStr} com fluxo alternante (bidirecional) ao Doppler colorido${psvStr}, compatível com suspeita de roubo da subclávia ${sl} (sinal de roubo parcial). Recomenda-se avaliação da artéria subclávia proximal.`;

    return `Artéria vertebral ${sl}${diamStr} com inversão completa do fluxo (retrógrado) ao Doppler colorido e pulsado${psvStr}, compatível com síndrome de roubo da subclávia ${sl} (roubo completo). Recomenda-se avaliação da artéria subclávia proximal ${sl}.`;
  },

  descPlaca(p) {
    if (!p) return '';
    const parts = [];
    const loc = p.loc ? `em parede ${p.loc}` : '';
    const eco = p.eco || '';
    const hom = p.hom || '';
    const calc = p.calc && p.calc !== 'Ausente' ? `calcificação ${p.calc.toLowerCase()}` : '';
    const sup = p.sup ? `superfície ${p.sup.toLowerCase()}` : '';
    const ulc = p.ulc === 'Presente' ? 'com ulceração' : '';
    // v.carotida-02 patch LIM-03: mobilidade field (Mannheim/prompt mestre)
    const mob = p.mob === 'Presente' ? 'com mobilidade ao Doppler (flap móvel)' : '';
    const dims = (p.comp && p.esp) ? `medindo ${p.comp} × ${p.esp} mm` : p.comp ? `extensão ${p.comp} mm` : '';

    // Build morphological description
    let desc = 'Placa ateromatosa';
    if (eco) desc += ` ${eco.toLowerCase()}`;
    if (hom) desc += `, ${hom.toLowerCase()}`;
    if (loc) desc += ` ${loc}`;
    if (dims) desc += `, ${dims}`;
    const attrs = [calc, sup, ulc, mob].filter(Boolean);
    if (attrs.length) desc += `, com ${attrs.join(', ')}`;
    desc += '.';
    return desc;
  },

  descKinking(side, tipo) {
    const sl = side === 'd' ? 'direita' : 'esquerda';
    const t = tipo || 'kinking';
    return `Tortuosidade do tipo ${t} da artéria carótida interna ${sl}, sem evidência de repercussão hemodinâmica significativa ao Doppler colorido.`;
  },

  descEndarterectomia(side, status) {
    const sl = side === 'd' ? 'direita' : 'esquerda';
    const m = {
      'sem_restenose':  `sem restenose significativa ao método`,
      'leve':           `com restenose leve (estenose <50%) na região da endarterectomia`,
      'moderada':       `com restenose moderada (50–69%) na região da endarterectomia. Monitoramento recomendado`,
      'importante':     `com restenose importante (≥70%) na região da endarterectomia. Avaliação cirúrgica recomendada`,
    };
    return `Artéria carótida interna ${sl} pós-endarterectomia, ${m[status] || 'em seguimento'}.`;
  },

  descStent(side, status) {
    const sl = side === 'd' ? 'direita' : 'esquerda';
    const m = {
      'pervio':     `pérvio, sem evidência de estenose intrastent significativa ao Doppler`,
      'hiperplasia':`com evidência de hiperplasia intimal, sem critérios hemodinâmicos de restenose significativa`,
      'restenose':  `com restenose intrastent ao Doppler — velocidades elevadas, compatíveis com reestenose significativa`,
    };
    return `Stent em artéria carótida interna ${sl} ${m[status] || 'em seguimento'}.`;
  },

  /* CONCLUSION ENGINE — ordered by severity per prompt mestre */
  buildConcl(state) {
    const lines = [];
    const sides = ['d', 'e'];
    const sl = s => s === 'd' ? 'direita' : 'esquerda';
    const segLabelMap = { acc_d:'artéria carótida comum direita', bif_d:'bifurcação carotídea direita',
      aci_d:'artéria carótida interna direita', ace_d:'artéria carótida externa direita',
      acc_e:'artéria carótida comum esquerda', bif_e:'bifurcação carotídea esquerda',
      aci_e:'artéria carótida interna esquerda', ace_e:'artéria carótida externa esquerda' };

    // Helper to get ACI stenosis grade
    function aciGrade(s) {
      const d = state.vel[`aci_${s}`] || {};
      const hasPlaca = (state.achados[`aci_${s}`] || []).some(a => a.tipo === 'placa') ||
                       (state.achados[`bif_${s}`] || []).some(a => a.tipo === 'placa');
      return RE.stenoseACI(parseFloat(d.psv), parseFloat(d.edv), parseFloat(state.vel[`aci_${s}_ratio`]),
                           hasPlaca, d.manualStatus);
    }

    // 1. Oclusões
    sides.forEach(s => {
      const g = aciGrade(s);
      if (g && g.grade === 'oclusao')
        lines.push(`Oclusão da artéria carótida interna ${sl(s)}.`);
    });

    // 2. Suboclusões
    sides.forEach(s => {
      const g = aciGrade(s);
      if (g && g.grade === 'suboclusao')
        lines.push(`Suboclusão da artéria carótida interna ${sl(s)}.`);
    });

    // 3. Estenoses ≥70%
    sides.forEach(s => {
      const g = aciGrade(s);
      if (g && g.grade === 'gte70') {
        const d = state.vel[`aci_${s}`] || {};
        const psv = parseFloat(d.psv);
        const psvStr = !isNaN(psv) ? ` (VPS ${psv} cm/s` : '';
        const ratio = parseFloat(state.vel[`aci_${s}_ratio`]);
        const ratioStr = !isNaN(ratio) ? `, razão ${Number(ratio).toFixed(2)})` : (psvStr ? ')' : '');
        lines.push(`Estenose grave (≥70%, suboclusiva) da artéria carótida interna ${sl(s)}${psvStr}${ratioStr} — critérios IAC (SRU modificado). Recomenda-se confirmação por angiotomografia ou angiorressonância.`);
      }
    });

    // 4. Estenoses 50–69%
    sides.forEach(s => {
      const g = aciGrade(s);
      if (g && g.grade === '50_69') {
        const d = state.vel[`aci_${s}`] || {};
        const psv = parseFloat(d.psv);
        const psvStr = !isNaN(psv) ? ` (VPS ${psv} cm/s)` : '';
        lines.push(`Estenose moderada (50–69%) da artéria carótida interna ${sl(s)}${psvStr} — critérios IAC (SRU modificado).`);
      }
    });

    // 5. Estenoses <50%
    sides.forEach(s => {
      const g = aciGrade(s);
      if (g && g.grade === 'lt50')
        lines.push(`Estenose leve (<50%) da artéria carótida interna ${sl(s)} — critérios IAC (SRU modificado).`);
    });

    // 6–8. Restenoses, Stents, Endarterectomias (todos os segmentos carotídeos)
    ['acc','bif','aci','ace'].forEach(fn => sides.forEach(s => {
      const seg = `${fn}_${s}`;
      const lbl = segLabelMap[seg];
      const ach = state.achados[seg] || [];
      ach.filter(a => a.tipo === 'restenose_stent').forEach(() =>
        lines.push(`Restenose intrastent em ${lbl}.`));
      ach.filter(a => a.tipo === 'stent').forEach(a =>
        lines.push(`Stent em ${lbl} ${a.status === 'pervio' ? '(pérvio)' : a.status === 'restenose' ? '(restenose intrastent)' : '(hiperplasia intimal)'}.`));
      ach.filter(a => a.tipo === 'endarterectomia').forEach(a =>
        lines.push(`Pós-endarterectomia de ${lbl} — ${a.status === 'sem_restenose' ? 'sem restenose significativa' : 'restenose ' + a.status}.`));
    }));

    // 9. Placas — frase automática conforme grau de estenose (tabela IAC/SVU)
    // Frase de repercussão por grau de estenose
    function placaPhrase(segLabel, grade) {
      switch (grade) {
        case 'oclusao':
          return `Placa ateromatosa em ${segLabel} com ausência de fluxo (oclusão).`;
        case 'suboclusao':
        case 'gte70':
          return `Placa ateromatosa em ${segLabel} com importante repercussão hemodinâmica: estenose ≥ 70%.`;
        case '50_69':
          return `Placa ateromatosa em ${segLabel} com repercussão hemodinâmica: estenose 50–70%.`;
        case 'lt50':
        case 'normal':
        default:
          return `Placa ateromatosa em ${segLabel} sem repercussão hemodinâmica: estenose < 50%.`;
      }
    }
    ['acc_d','bif_d','aci_d','ace_d','acc_e','bif_e','aci_e','ace_e'].forEach(seg => {
      const placas = (state.achados[seg] || []).filter(a => a.tipo === 'placa' && !a._fromDropdown);
      const isACI = seg.startsWith('aci_');
      // Cada placa gera sua própria frase, conforme seu grau de estenose individual.
      // Exceção: na ACI a repercussão hemodinâmica já é definida pelas velocidades (seções 3–5),
      // então a placa da ACI apenas registra presença, sem repetir o grau.
      placas.forEach(p => {
        if (isACI) {
          lines.push(`Placa ateromatosa em ${segLabelMap[seg]}.`);
        } else {
          const grade = p.estenose || 'lt50';
          lines.push(placaPhrase(segLabelMap[seg], grade));
        }
      });
    });

    // 9b. Placa detalhada (dropdown morfológico) — conclusão correspondente, todos os segmentos
    ['acc_d','aci_d','ace_d','bif_d','acc_e','aci_e','ace_e','bif_e'].forEach(k => {
      const txt = (state.bifConcl || {})[k];
      if (txt && txt.trim()) lines.push(txt.trim());
    });

    // 10–12. Tortuosidades / Kinking / Coiling (todos os segmentos carotídeos)
    ['acc','bif','aci','ace'].forEach(fn => sides.forEach(s => {
      const seg = `${fn}_${s}`;
      const lbl = segLabelMap[seg];
      const ach = state.achados[seg] || [];
      ['tortuosidade','kinking','coiling'].forEach(tipo => {
        if (ach.some(a => a.tipo === tipo))
          lines.push(`${tipo.charAt(0).toUpperCase()+tipo.slice(1)} da ${lbl}, sem repercussão hemodinâmica ao Doppler.`);
      });
    }));

    // 13. Alterações vertebrais
    sides.forEach(s => {
      const d = state.vel[`av_${s}`] || {};
      const vClass = RE.classVert(d.fluxo || 'anterogrado');
      if (vClass && vClass.grade !== 'normal') {
        if (vClass.grade === 'completo')
          lines.push(`Síndrome de roubo da subclávia ${sl(s)} — fluxo retrógrado na artéria vertebral ${sl(s)}.`);
        else
          lines.push(`Suspeita de roubo da subclávia ${sl(s)} — fluxo alternante na artéria vertebral ${sl(s)}.`);
      }
    });

    // 14. Espessamento médio-intimal / placa por EMI — frase automática conforme faixa
    sides.forEach(s => {
      const imt = parseFloat((state.vel[`acc_${s}`] || {}).imt);
      const c = RE.classIMT(imt);
      if (!c || c.grade === 'normal') return;
      if (c.grade === 'placa')
        lines.push(`Espessura médio-intimal da artéria carótida comum ${sl(s)} de ${imt.toFixed(1)} mm (> 1,5 mm), caracterizando placa aterosclerótica.`);
      else if (c.grade === 'focal')
        lines.push(`Espessamento médio-intimal focal da artéria carótida comum ${sl(s)} (EMI ${imt.toFixed(1)} mm).`);
      else
        lines.push(`Espessamento médio-intimal da artéria carótida comum ${sl(s)} (EMI ${imt.toFixed(1)} mm).`);
    });

    if (lines.length === 0)
      return 'Exame Doppler das artérias carótidas e vertebrais sem alterações ultrassonográficas significativas.';

    return lines.join('\n');
  },
};

/* ════════════════════════════════════════════════════════════
   APP STATE
   ════════════════════════════════════════════════════════════ */
let ST = {
  vel: {
    // Each keyed as acc_d, aci_d, ace_d, av_d, acc_e, aci_e, ace_e, av_e
    // Fields: psv, edv, ir, imt, diam, fluxo, manualStatus, ratio (computed)
  },
  achados: {
    // Keyed by segment: acc_d, bif_d, aci_d, ace_d, av_d, acc_e, bif_e, aci_e, ace_e, av_e
    // Array of finding objects
  },
  ovr: {},       // segment override text
  conclOvr: null,
  comments: [],  // [{id, text, on}]
  bifConcl: {},  // {seg: frase de conclusao da placa (editavel)}
  placa: {},     // {seg: {tipo, esp, ext}} — medidas estruturadas da placa (fonte única)
  selectedSeg: null,
};

let _rt = null;
function sched() { clearTimeout(_rt); _rt = setTimeout(render, 80); }

/* ════════════════════════════════════════════════════════════
   VELOCITY TAB
   ════════════════════════════════════════════════════════════ */
const VEL_SEGS = [
  { key:'acc_d', lbl:'ACC',   side:'Direito',  hasIMT:true,  hasDiam:false, hasFluxo:false, hasManual:false },
  { key:'aci_d', lbl:'ACI',   side:'Direito',  hasIMT:false, hasDiam:false, hasFluxo:false, hasManual:true  },
  { key:'ace_d', lbl:'ACE',   side:'Direito',  hasIMT:false, hasDiam:false, hasFluxo:false, hasManual:false },
  { key:'av_d',  lbl:'AV',    side:'Direito',  hasIMT:false, hasDiam:true,  hasFluxo:true,  hasManual:false },
  { key:'acc_e', lbl:'ACC',   side:'Esquerdo', hasIMT:true,  hasDiam:false, hasFluxo:false, hasManual:false },
  { key:'aci_e', lbl:'ACI',   side:'Esquerdo', hasIMT:false, hasDiam:false, hasFluxo:false, hasManual:true  },
  { key:'ace_e', lbl:'ACE',   side:'Esquerdo', hasIMT:false, hasDiam:false, hasFluxo:false, hasManual:false },
  { key:'av_e',  lbl:'AV',    side:'Esquerdo', hasIMT:false, hasDiam:true,  hasFluxo:true,  hasManual:false },
];

function buildVelTab() {
  const c = document.getElementById('vel-container');
  let html = '';
  let lastSide = '';
  VEL_SEGS.forEach(seg => {
    if (seg.side !== lastSide) {
      if (lastSide) html += `</tbody></table>`;
      html += `<table class="vtab"><thead><tr class="side-hdr"><td colspan="3">LADO ${seg.side.toUpperCase()}</td></tr>
        <tr><th class="seg">Segmento</th><th>VPS (cm/s)</th><th>VDF (cm/s)</th></tr></thead><tbody>`;
      lastSide = seg.side;
    }
    const d = ST.vel[seg.key] || {};
    // IR auto-calc: (PSV - EDV) / PSV
    const psvN = parseFloat(d.psv), edvN = parseFloat(d.edv);
    const irAuto = (!isNaN(psvN) && !isNaN(edvN) && psvN > 0) ? ((psvN - edvN) / psvN).toFixed(2) : '';

    // Auto-calc IR: salvar no estado para uso no laudo
    if (irAuto) {
      if (!ST.vel[seg.key]) ST.vel[seg.key] = {};
      ST.vel[seg.key].ir = irAuto;
    }

    html += `<tr><td class="seg">${seg.lbl}</td>
      <td><input type="number" class="vi" id="v-${seg.key}-psv" step="1" min="0" placeholder="—" value="${d.psv||''}" oninput="onV('${seg.key}','psv',this.value)"></td>
      <td><input type="number" class="vi" id="v-${seg.key}-edv" step="1" min="0" placeholder="—" value="${d.edv||''}" oninput="onV('${seg.key}','edv',this.value)"></td></tr>`;

    // EMI (espessura médio-intimal) row for ACC — com classificação automática
    if (seg.hasIMT) {
      const imtVal = d.imt || '';
      const imtC = RE.classIMT(parseFloat(imtVal));
      const imtLbl = imtC ? imtC.label : '';
      const imtCol = imtC ? (imtC.css==='ok'?'var(--ok)':imtC.css==='er'?'var(--er)':'var(--wn)') : '';
      html += `<tr><td colspan="3" style="padding:3px 4px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:10.5px;font-weight:700;color:var(--dim)">EMI (mm):</span>
          <input type="number" class="vi" id="v-${seg.key}-imt" step="0.1" min="0" placeholder="—" value="${imtVal}" oninput="onIMT('${seg.key}',this.value)" style="flex:0 0 90px;max-width:90px">
          <span id="imt-cls-${seg.key}" style="font-size:10.5px;font-weight:700;color:${imtCol}">${imtLbl}</span>
        </div></td></tr>`;
    }

    // Fluxo row for AV
    if (seg.hasFluxo) {
      const fluxo = d.fluxo || 'anterogrado';
      html += `<tr><td colspan="3" style="padding:3px 4px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:10.5px;font-weight:700;color:var(--N3)">Fluxo:</span>
          <select class="dir-sel" id="v-${seg.key}-fluxo" onchange="onV('${seg.key}','fluxo',this.value)" style="flex:1">
            <option value="anterogrado" ${fluxo==='anterogrado'?'selected':''}>Anterógrado</option>
            <option value="alternante"  ${fluxo==='alternante'?'selected':''}>Alternante (bidirecional)</option>
            <option value="retrogrado"  ${fluxo==='retrogrado'?'selected':''}>Retrógrado</option>
          </select>
        </div></td></tr>`;
    }

  });
  if (lastSide) html += `</tbody></table>`;

  // Ratio display
  html += `<div style="margin-top:8px;padding:7px 9px;background:var(--sur3);border:1px solid var(--bdr);border-radius:var(--r);font-size:11px">
    <b style="color:var(--N)">Razões VPS ACI/VPS ACC (IAC):</b>
    <div style="display:flex;gap:20px;margin-top:4px">
      <div>Direita: <span id="ratio-d" style="font-weight:700;color:var(--R)">—</span></div>
      <div>Esquerda: <span id="ratio-e" style="font-weight:700;color:var(--R)">—</span></div>
    </div>
    <div style="margin-top:4px;font-size:10px;color:var(--N3)">Ref.: &lt;2 = Normal · 2–4 = 50–69% · &gt;4 = ≥70% (IAC)</div>
  </div>`;

  c.innerHTML = html;
}

function onV(key, field, val) {
  if (!ST.vel[key]) ST.vel[key] = {};
  ST.vel[key][field] = val;
  autoRatios();
  sched();
}

function onIMT(key, val) {
  if (!ST.vel[key]) ST.vel[key] = {};
  ST.vel[key].imt = val;
  const span = document.getElementById(`imt-cls-${key}`);
  if (span) {
    const c = RE.classIMT(parseFloat(val));
    span.textContent = c ? c.label : '';
    span.style.color = c ? (c.css==='ok'?'var(--ok)':c.css==='er'?'var(--er)':'var(--wn)') : '';
  }
  sched();
}

function autoRatios() {
  ['d', 'e'].forEach(s => {
    const aci = parseFloat((ST.vel[`aci_${s}`] || {}).psv);
    const acc = parseFloat((ST.vel[`acc_${s}`] || {}).psv);
    const el = document.getElementById(`ratio-${s}`);
    if (!isNaN(aci) && !isNaN(acc) && acc > 0) {
      const r = (aci / acc).toFixed(2);
      ST.vel[`aci_${s}_ratio`] = r;
      if (el) {
        const n = parseFloat(r);
        el.textContent = r;
        el.style.color = n >= 4 ? 'var(--er)' : n >= 2 ? 'var(--wn)' : 'var(--ok)';
      }
    } else {
      delete ST.vel[`aci_${s}_ratio`];
      if (el) { el.textContent = '—'; el.style.color = 'var(--N3)'; }
    }
  });
}

function getSegColor(segId) {
  const achados = ST.achados[segId] || [];
  if (achados.some(a => a.tipo === 'oclusao'))    return 'var(--mc-oclusao)';
  if (achados.some(a => a.tipo === 'restenose_stent')) return 'var(--mc-restenose)';
  if (achados.some(a => a.tipo === 'stent'))       return 'var(--mc-stent)';
  if (achados.some(a => a.tipo === 'estenose')) {
    const d = ST.vel[segId] || {};
    const ratio = parseFloat(ST.vel[`${segId}_ratio`] || '');
    const g = RE.stenoseACI(parseFloat(d.psv), parseFloat(d.edv), ratio,
              achados.some(a => a.tipo === 'placa'), d.manualStatus);
    return g && g.grade !== 'normal' ? 'var(--mc-estenose)' : 'var(--mc-placa)';
  }
  if (achados.some(a => a.tipo === 'placa'))       return 'var(--mc-placa)';
  if (achados.some(a => ['kinking','coiling','tortuosidade'].includes(a.tipo))) return 'var(--mc-placa)';
  return 'var(--mc-normal)';
}

function buildSVG() {
  const svg = document.getElementById('svgmap');
  if (!svg) return;   // Aba Mapa removida — função inerte

  // Draw body silhouette (neck/head outline)
  svg.innerHTML = `
    <!-- Background -->
    <rect width="240" height="420" fill="#F8F9FA" rx="6"/>
    
    <!-- Shoulder base -->
    <ellipse cx="120" cy="385" rx="105" ry="28" fill="#E8ECEF" stroke="#CDD0D6" stroke-width="1"/>
    
    <!-- Neck -->
    <rect x="88" y="200" width="64" height="170" rx="10" fill="#E8ECEF" stroke="#CDD0D6" stroke-width="1"/>
    
    <!-- Head -->
    <ellipse cx="120" cy="175" rx="52" ry="62" fill="#E8ECEF" stroke="#CDD0D6" stroke-width="1"/>
    
    <!-- Trachea hint -->
    <rect x="113" y="210" width="14" height="140" rx="5" fill="#DDE1E7" stroke="#CDD0D6" stroke-width=".5"/>
    
    <!-- Side labels -->
    <text x="55" y="395" font-family="Segoe UI,sans-serif" font-size="9" font-weight="700" fill="#546E7A" text-anchor="middle">DIREITO</text>
    <text x="185" y="395" font-family="Segoe UI,sans-serif" font-size="9" font-weight="700" fill="#546E7A" text-anchor="middle">ESQUERDO</text>
  `;

  // Draw vessel segments
  SVG_SEGS.forEach(seg => {
    const color = getSegColor(seg.id);
    const isSelected = ST.selectedSeg === seg.id;
    const achCount = (ST.achados[seg.id] || []).length;

    // Draw paths (strokes representing vessels)
    seg.paths.forEach(([x1, y1, x2, y2]) => {
      // Vessel tube
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', color);
      line.setAttribute('stroke-width', isSelected ? '9' : '7');
      line.setAttribute('stroke-linecap', 'round');
      line.style.cursor = 'pointer';
      line.style.transition = 'stroke .2s, stroke-width .2s';
      line.addEventListener('click', () => selectSeg(seg.id));
      line.addEventListener('mouseenter', function() {
        if (ST.selectedSeg !== seg.id) this.setAttribute('stroke', 'var(--mc-hover)');
      });
      line.addEventListener('mouseleave', function() {
        if (ST.selectedSeg !== seg.id) this.setAttribute('stroke', color);
      });
      svg.appendChild(line);

      // Selection halo
      if (isSelected) {
        const halo = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        halo.setAttribute('x1', x1); halo.setAttribute('y1', y1);
        halo.setAttribute('x2', x2); halo.setAttribute('y2', y2);
        halo.setAttribute('stroke', 'rgba(192,57,43,.25)');
        halo.setAttribute('stroke-width', '16');
        halo.setAttribute('stroke-linecap', 'round');
        svg.insertBefore(halo, svg.firstChild);
      }
    });

    // Clickable hit area (larger invisible zone)
    const [x1, y1, x2, y2] = seg.paths[0];
    const hitLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    hitLine.setAttribute('x1', x1); hitLine.setAttribute('y1', y1);
    hitLine.setAttribute('x2', x2); hitLine.setAttribute('y2', y2);
    hitLine.setAttribute('stroke', 'transparent');
    hitLine.setAttribute('stroke-width', '22');
    hitLine.style.cursor = 'pointer';
    hitLine.addEventListener('click', () => selectSeg(seg.id));
    svg.appendChild(hitLine);

    // Label
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('x', seg.cx);
    lbl.setAttribute('y', seg.cy);
    lbl.setAttribute('font-family', 'Segoe UI,sans-serif');
    lbl.setAttribute('font-size', '8.5');
    lbl.setAttribute('font-weight', '700');
    lbl.setAttribute('fill', '#333');
    lbl.setAttribute('text-anchor', 'middle');
    lbl.style.cursor = 'pointer';
    lbl.style.userSelect = 'none';
    lbl.textContent = seg.lbl;
    lbl.addEventListener('click', () => selectSeg(seg.id));
    svg.appendChild(lbl);

    // Badge for achado count
    if (achCount > 0) {
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      bg.setAttribute('cx', seg.cx + 9);
      bg.setAttribute('cy', seg.cy - 9);
      bg.setAttribute('r', '6');
      bg.setAttribute('fill', color === 'var(--mc-normal)' ? '#9E9E9E' : color);
      svg.appendChild(bg);
      const cnt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      cnt.setAttribute('x', seg.cx + 9);
      cnt.setAttribute('y', seg.cy - 5.5);
      cnt.setAttribute('font-family', 'Segoe UI,sans-serif');
      cnt.setAttribute('font-size', '7');
      cnt.setAttribute('font-weight', '700');
      cnt.setAttribute('fill', '#fff');
      cnt.setAttribute('text-anchor', 'middle');
      cnt.textContent = achCount;
      svg.appendChild(cnt);
    }
  });
}

function togAch(segId, idx) {
  if (!ST.achados[segId]) return;
  ST.achados[segId][idx]._open = !(ST.achados[segId][idx]._open !== false);
  buildSegPanel(segId);
}

function addAch(segId) {
  const sel = document.getElementById(`tipo-sel-${segId}`);
  if (!sel || !sel.value) return;
  if (!ST.achados[segId]) ST.achados[segId] = [];
  ST.achados[segId].push({ tipo: sel.value, _open: true });
  sel.value = '';
  buildSVG();
  buildSegPanel(segId);
  sched();
}

function removeAch(segId, idx) {
  ST.achados[segId].splice(idx, 1);
  buildSVG();
  buildSegPanel(segId);
  sched();
}

function updAch(segId, idx, field, val) {
  if (ST.achados[segId] && ST.achados[segId][idx]) {
    ST.achados[segId][idx][field] = val;
    buildSVG();
    sched();
  }
}

// Replica as medidas digitadas na descrição ("medindo X mm ... por Y mm ...") para a conclusão ("medindo X x Y mm")
function syncPlacaDims(key, descVal) {
  if (!ST.bifConcl || !ST.bifConcl[key]) return;
  const m = (descVal || '').match(/medindo\s+([\d.,]+|_+)\s*mm de espessura máxima por\s+([\d.,]+|_+)\s*mm de extens/i);
  if (!m) return;
  const esp = m[1], ext = m[2];
  const novo = ST.bifConcl[key].replace(/medindo\s+(?:[\d.,]+|_+)\s*x\s*(?:[\d.,]+|_+)\s*mm/i, `medindo ${esp} x ${ext} mm`);
  if (novo !== ST.bifConcl[key]) {
    ST.bifConcl[key] = novo;

function insertPlacaModel(key, tipo) {
  const seg = DESC_SEGS.find(s => s.key === key);
  if (!seg) return;
  const models = SEG_PLACA_MODELOS[seg.fn];
  if (!tipo || !models || !models[tipo]) return;
  if (!ST.placa) ST.placa = {};
  ST.placa[key] = { tipo, esp: '', ext: '' };
  // Registra a presença de placa (reativa hasPlaca/grau — ACI <50%, etc.)
  if (!ST.achados) ST.achados = {};
  ST.achados[key] = [{ tipo: 'placa', _fromDropdown: true }];
  if (!ST.bifConcl) ST.bifConcl = {};
  if (!ST.descOpen) ST.descOpen = {};
  ST.descOpen[key] = true;
  composePlaca(seg);          // gera ST.ovr[key] e ST.bifConcl[key] a partir do modelo + medidas
  buildDescTab();
  sched();
  // UX: foco direto no campo de espessura para preencher a medida
  setTimeout(() => { const el = document.getElementById('pd-esp-' + key); if (el) el.focus(); }, 40);
}

// Fonte única: gera descrição e conclusão da placa a partir do modelo + medidas estruturadas.
function composePlaca(seg) {
  const key = seg.key;
  const p = ST.placa && ST.placa[key];
  if (!p) return;
  const m = (SEG_PLACA_MODELOS[seg.fn] || {})[p.tipo];
  if (!m) return;
  const L = seg.side === 'e' ? 'esquerda' : 'direita';
  const esp = (p.esp && String(p.esp).trim()) ? String(p.esp).trim() : '_____';
  const ext = (p.ext && String(p.ext).trim()) ? String(p.ext).trim() : '_____';
  const sub = t => t.split('«ESP»').join(esp).split('«EXT»').join(ext);
  // Descrição: substitutiva se velocidade normal; aditiva (placa + auto velocidade) se alterada
  let desc = sub(m.desc(L));
  if (!isDescNormal(seg)) { const auto = getAutoDesc(seg).trim(); if (auto) desc = desc + '\n' + auto; }
  ST.ovr[key] = desc;
  // Conclusão: em ACI/bifurcação a repercussão vem da velocidade → frase morfológica (sem veredito fixo)
  let concl = sub(m.concl(L));
  if (seg.fn === 'aci' || seg.fn === 'bif')
    concl = concl.replace(/,?\s*sem repercussão hemodinâmica significativa\.?$/i, '.');
  ST.bifConcl[key] = concl;
}

function setPlacaDim(key, which, val) {
  if (!ST.placa || !ST.placa[key]) return;
  ST.placa[key][which] = val;
  const seg = DESC_SEGS.find(s => s.key === key);
  composePlaca(seg);
  // Atualiza as textareas ao vivo sem reconstruir (preserva foco no campo numérico)
  const ta = document.getElementById('ta-' + key); if (ta) ta.value = ST.ovr[key] || '';
  const bc = document.getElementById('bc-' + key); if (bc) bc.value = ST.bifConcl[key] || '';
  sched();
}

function insertBifPlaca(key, tipo) {

function delBifConcl(key) {
  if (ST.bifConcl) delete ST.bifConcl[key];
  if (ST.placa) delete ST.placa[key];
  // Remove o marcador de placa do dropdown (reverte hasPlaca)
  if (ST.achados && ST.achados[key] && ST.achados[key].some(a => a._fromDropdown))
    delete ST.achados[key];
  buildDescTab();
  sched();
}

function isDescNormal(seg) {
  const achados = ST.achados[seg.key] || [];
  if (achados.length > 0) return false;
  const d = ST.vel[seg.key] || {};
  if (seg.fn === 'aci') {
    const g = RE.stenoseACI(parseFloat(d.psv), parseFloat(d.edv),
      parseFloat(ST.vel[`aci_${seg.side}_ratio`]),
      false, d.manualStatus);
    return !g || g.grade === 'normal';
  }
  if (seg.fn === 'av') {
    const v = RE.classVert(d.fluxo || 'anterogrado');
    return !v || v.grade === 'normal';
  }
  if (seg.fn === 'acc') {
    const imt = RE.classIMT(parseFloat(d.imt));
    return !imt || imt.grade === 'normal';
  }
  return true;
}

function togDesc(key) {
  if (!ST.descOpen) ST.descOpen = {};
  ST.descOpen[key] = !(ST.descOpen[key] !== false);
  const body = document.getElementById(`db-${key}`);
  const hdr  = document.getElementById(`dshd-${key}`);
  if (body) body.classList.toggle('on', ST.descOpen[key]);
  if (hdr)  hdr.classList.toggle('on',  ST.descOpen[key]);
}

function initOvr(key, cur) { ST.ovr[key] = cur.replace(/\\n/g, '\n'); buildDescTab(); sched(); }
function resetOvr(key) { delete ST.ovr[key]; if (ST.bifConcl) delete ST.bifConcl[key]; if (ST.placa) delete ST.placa[key]; if (ST.achados && ST.achados[key] && ST.achados[key].some(a => a._fromDropdown)) delete ST.achados[key]; buildDescTab(); sched(); }

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

   DITADO POR VOZ (Tier 1) — Web Speech API, pt-BR
   Insere texto nos campos editáveis de descrição/conclusão.

let recog = null;
let recogState = { active: false, type: null, key: null };

function micId(type, key) { return type === 'concl' ? 'mic-concl' : 'mic-desc-' + key; }

function updateMicUI() {
  document.querySelectorAll('.mic-btn').forEach(b => b.classList.remove('rec'));
  if (recogState.active) {
    const b = document.getElementById(micId(recogState.type, recogState.key));
    if (b) b.classList.add('rec');
  }
}

function appendToField(type, key, text) {
  let el, cur;
  if (type === 'concl') {
    el = document.getElementById('concl-edit');
    cur = ST.conclOvr !== null ? ST.conclOvr : (el ? el.value : '');
  } else {
    el = document.getElementById('ta-' + key);
    cur = ST.ovr[key] !== undefined ? ST.ovr[key] : (el ? el.value : '');
  }
  cur = cur || '';
  const sep = (cur && !/\s$/.test(cur)) ? ' ' : '';
  const next = cur + sep + text;
  if (type === 'concl') ST.conclOvr = next; else ST.ovr[key] = next;
  if (el) el.value = next;
  sched();
}

function startDictar(type, key) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Ditado por voz disponível apenas no Chrome/Edge.'); return; }
  stopDictar(true);                       // encerra sessão anterior, se houver
  const r = new SR();
  r.lang = 'pt-BR';
  r.continuous = true;
  r.interimResults = true;
  recog = r;
  recogState = { active: true, type, key };
  r.onresult = (e) => {
    if (recog !== r) return;
    let fin = '';
    for (let i = e.resultIndex; i < e.results.length; i++)
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
    if (fin.trim()) appendToField(type, key, fin.trim());
  };
  r.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      toast('Permissão de microfone negada.');
      recogState.active = false; recog = null; updateMicUI();
    }
    // 'no-speech'/'aborted' são ignorados — onend trata o religamento
  };
  r.onend = () => {
    // Religa automaticamente para contornar o corte de ~60s e as pausas do Chrome
    if (recog === r && recogState.active) { try { r.start(); } catch(_) {} }
  };
  try { r.start(); } catch(_) {}
  updateMicUI();
  toast('🎤 Ditado ativo — clique no microfone para parar', 0);
}

function stopDictar(silent) {
  recogState.active = false;
  const r = recog; recog = null;
  if (r) { try { r.onend = null; } catch(_) {} try { r.stop(); } catch(_) {} try { r.abort && r.abort(); } catch(_) {} }
  updateMicUI();
  if (!silent) toast('Ditado encerrado');
}

function dictar(type, key) {
  if (recogState.active && recogState.type === type && recogState.key === key) { stopDictar(); return; }
  startDictar(type, key);
}

function resetConcl() {
  ST.conclOvr = null;
  const ta = document.getElementById('concl-edit');
  if (ta) ta.value = RE.buildConcl(ST);
  sched();
}

function updateConclDisplay() {
  const ta = document.getElementById('concl-edit');
  if (!ta) return;
  if (document.activeElement === ta) return;   // não sobrescrever enquanto o usuário digita
  ta.value = ST.conclOvr !== null ? ST.conclOvr : RE.buildConcl(ST);
}

/* ── Chips de placa na conclusão ── */
let chipSide = 'd';   // 'd' = direita, 'e' = esquerda

function setChipSide(s) {
  chipSide = s;
  const d = document.getElementById('cs-d'), e = document.getElementById('cs-e');
  if (d) d.classList.toggle('active', s === 'd');
  if (e) e.classList.toggle('active', s === 'e');
}

const CHIP_GROUPS = [
  { key: 'acc', lbl: 'ACC — Artéria carótida comum',   term: 'artéria carótida comum' },
  { key: 'aci', lbl: 'ACI — Artéria carótida interna', term: 'artéria carótida interna' },
  { key: 'bif', lbl: 'Bifurcação carotídea',           term: 'bifurcação carotídea' },
  { key: 'ace', lbl: 'ACE — Artéria carótida externa', term: 'artéria carótida externa' },
];

function chipPhrase(key, term, calc) {
  const side = chipSide === 'd' ? 'direita' : 'esquerda';
  if (calc) {
    // ACC e ACI calcificadas: sem vírgula antes de "sem" (conforme padrão fornecido)
    if (key === 'acc' || key === 'aci')
      return `Placa ateromatosa calcificada em ${term} ${side} sem repercussão hemodinâmica.`;
    return `Placa ateromatosa calcificada em ${term} ${side}, sem repercussão hemodinâmica.`;
  }
  return `Placa ateromatosa em ${term} ${side}, sem repercussão hemodinâmica.`;
}

function buildChips() {
  const c = document.getElementById('chip-groups');
  if (!c) return;
  c.innerHTML = CHIP_GROUPS.map(g => `
    <div class="chip-grp">
      <div class="chip-grp-lbl">${g.lbl}</div>
      <div class="chip-row">
        <button class="chip" onclick="addConclChip(chipPhrase('${g.key}','${g.term}',true))">
          <span class="chip-tag calc">CALC</span>Placa calcificada</button>
        <button class="chip" onclick="addConclChip(chipPhrase('${g.key}','${g.term}',false))">
          <span class="chip-tag">PLACA</span>Placa ateromatosa</button>
      </div>
    </div>`).join('');
}

function addConclChip(text) {
  let cur = ST.conclOvr !== null ? ST.conclOvr : RE.buildConcl(ST);
  cur = (cur || '').trim();
  if (!cur || cur === CONCL_DEFAULT) cur = text;          // substitui a frase "sem alterações"
  else cur = cur.replace(/\s+$/, '') + '\n' + text;        // anexa em nova linha
  ST.conclOvr = cur;
  const ta = document.getElementById('concl-edit');
  if (ta) ta.value = cur;
  sched();
}

function gv(id) { return (document.getElementById(id)||{}).value||''; }
function gc(id) { return (document.getElementById(id)||{}).checked||false; }

function render() {
  updateConclDisplay();
  renderPage1();
  if (ST.selectedSeg) buildDescTab();
}

function renderPage1() {
  const UC = s => (s||'').toUpperCase();
  const nome  = UC(gv('f-nome')),  idade = gv('f-idade'), sexo = gv('f-sexo');
  const data  = gv('f-data'),  solic = UC(gv('f-solic')), conv = UC(gv('f-conv'));
  const indic = UC(gv('f-indic')), obs   = gv('f-obs'),   tec  = gv('f-tec');
  let df = data;
  if (data) { const [y,m,d] = data.split('-'); df = `${d}/${m}/${y}`; }
  const sx = sexo==='M'?'MASC.':sexo==='F'?'FEM.':'';
  const frs = [gc('fr-has')&&'HAS',gc('fr-dm')&&'DM',gc('fr-dis')&&'Dislipidemia',
    gc('fr-tab')&&'Tabagismo',gc('fr-avc')&&'AVC/AIT',gc('fr-card')&&'Cardiopatia',gc('fr-drc')&&'DRC'].filter(Boolean);

  // Velocity preview table
  function velCell(key, field, refs) {
    const v = (ST.vel[key] || {})[field];
    if (!v && v !== 0) return `<span class="em">—</span>`;
    const n = parseFloat(v);
    if (isNaN(n)) return `<span class="em">—</span>`;
    if (!refs) return n;
    const [mn, mx] = refs;
    return `<span class="${n>=mn&&n<=mx?'ok':Math.abs(n-mx)<mx*.15||Math.abs(n-mn)<mn*.15?'wn':'er'}">${n}</span>`;
  }
  // IR auto-calculated from PSV and EDV: IR = (VPS−VDF)/VPS
  function velCellIR(key) {
    const d = ST.vel[key] || {};
    const psv = parseFloat(d.psv), edv = parseFloat(d.edv);
    // Use stored IR if manually set (for ACI), else compute from PSV/EDV
    let ir = parseFloat(d.ir);
    if (isNaN(ir) && !isNaN(psv) && !isNaN(edv) && psv > 0) {
      ir = (psv - edv) / psv;
    }
    if (isNaN(ir)) return `<span class="em">—</span>`;
    const mn = 0.55, mx = 0.75;
    return `<span class="${ir>=mn&&ir<=mx?'ok':Math.abs(ir-mx)<0.05||Math.abs(ir-mn)<0.05?'wn':'er'}">${ir.toFixed(2)}</span>`;
  }
  function imtCell(side) {
    const v = (ST.vel[`acc_${side}`] || {}).imt;
    if (!v && v !== 0) return `<span class="em">—</span>`;
    const n = parseFloat(v);
    if (isNaN(n)) return `<span class="em">—</span>`;
    const c = RE.classIMT(n);
    return `<span class="${c ? c.css : 'em'}">${n.toFixed(1)}</span>`;
  }
  function diamCell(side) {
    const v = (ST.vel[`av_${side}`] || {}).diam;
    if (!v) return `<span class="em">—</span>`;
    const n = parseFloat(v);
    return `<span class="${n>=2.5&&n<=4.5?'ok':'wn'}">${n.toFixed(1)} mm</span>`;
  }
  function ratioCell(side) {
    const r = ST.vel[`aci_${side}_ratio`];
    if (!r) return `<span class="em">—</span>`;
    const n = parseFloat(r);
    return `<span class="${n<2?'ok':n<4?'wn':'er'}">${Number(n).toFixed(2)}</span>`;
  }
  // Coluna "VPS ACI/VPS ACC" — só faz sentido na linha da ACI; demais segmentos: —
  function ratioColCell(side, seg) {
    return seg === 'aci' ? ratioCell(side) : `<span class="em">—</span>`;
  }

  const velTable = `
  <div class="vel-wrap">
  <table class="pvt" style="border:1px solid #ccc;width:100%;margin-bottom:6px">
    <tr>
      <td class="side" colspan="5" style="text-align:center;font-weight:bold;background:#ddd;padding:3px 5px">LADO DIREITO</td>
    </tr>
    <tr>
      <th style="text-align:left;padding:2px 4px;background:#eee">Artéria</th>
      <th style="padding:2px 4px;background:#eee">VPS (cm/s)</th>
      <th style="padding:2px 4px;background:#eee">VDF (cm/s)</th>
      <th style="padding:2px 4px;background:#eee">VPS ACI/VPS ACC</th>
      <th style="padding:2px 4px;background:#eee">IR</th>
    </tr>

/* ════════════════════════════════════════════════════════════
   AUTO-SHRINK — encolhe o conteúdo p/ caber em 1 página A4,
   evitando corte na impressão / geração de PDF.
   ════════════════════════════════════════════════════════════ */
function fitToPage() {
  const body = document.querySelector('.a4-body');
  const fit  = document.getElementById('a4fit');
  if (!body || !fit) return;
  // Reset antes de medir
  fit.style.transform = 'none';
  fit.style.width = '100%';
  const cs = getComputedStyle(body);
  const avail = body.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
  const need  = fit.scrollHeight;
  if (need > avail && need > 0) {
    // piso de 0,55 evita encolhimento ilegível em casos extremos
    const s = Math.max(0.55, avail / need);
    fit.style.transform = `scale(${s})`;
    fit.style.width = (100 / s) + '%';
  }
}

/* ════════════════════════════════════════════════════════════
   PASTA DE DESTINO PARA PDFs (File System Access API + IndexedDB)
   ════════════════════════════════════════════════════════════ */
const IDB_DB = 'dopcar_fs', IDB_STORE = 'handles', IDB_KEY = 'pdfDir';
let pdfDirHandle = null;

function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_DB, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbSet(k, v) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(v, k);
    tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(k) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const rq = tx.objectStore(IDB_STORE).get(k);
    rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error);
  });
}

async function verifyPerm(handle, write) {
  const opts = write ? { mode: 'readwrite' } : {};
  // queryPermission não dispara prompt; se já concedido, evita pedir de novo.
  try { if ((await handle.queryPermission(opts)) === 'granted') return true; } catch(e) {}
  // requestPermission exige ativação de usuário — deve ser chamado o mais cedo
  // possível dentro do gesto (clique). Se a permissão decaiu p/ 'prompt' após
  // recarregar a página, isto reabre o pedido de acesso à pasta.
  try { return (await handle.requestPermission(opts)) === 'granted'; } catch(e) { return false; }
}

function updateFolderUI() {
  const b = document.getElementById('btnPasta');
  if (!b) return;
  if (pdfDirHandle) {
    b.textContent = '📁 ' + pdfDirHandle.name;
    b.classList.add('active-folder');
    b.title = 'Pasta de destino: ' + pdfDirHandle.name + ' (clique para trocar)';
  } else {
    b.textContent = '📁 Pasta PDF';
    b.classList.remove('active-folder');

}

async function chooseFolder() {
  if (!window.showDirectoryPicker) {
    toast('Seleção de pasta disponível apenas no Chrome/Edge. Os PDFs irão para a pasta Downloads.');
    return;
  }
  try {
    const h = await window.showDirectoryPicker({ id: 'dopcar-pdf', mode: 'readwrite' });
    pdfDirHandle = h;
    try { await idbSet(IDB_KEY, h); } catch(e) {}
    updateFolderUI();
    toast('✓ Pasta de destino: ' + h.name);
  } catch(e) {
    if (e.name !== 'AbortError') toast('Erro ao escolher pasta: ' + e.message);
  }
}

async function restoreFolder() {
  if (!window.showDirectoryPicker) return;
  try {
    const h = await idbGet(IDB_KEY);
    if (h) { pdfDirHandle = h; updateFolderUI(); }
  } catch(e) {}
}

async function genPDF() {
  const { jsPDF } = window.jspdf;
  // ── Resolver permissão da pasta como PRIMEIRA ação, ainda dentro do gesto
  //    do clique. requestPermission() só funciona com ativação de usuário válida;
  //    qualquer await pesado (html2canvas) antes disto invalidaria o gesto.
  let useFolder = false;
  if (pdfDirHandle) {
    try { useFolder = await verifyPerm(pdfDirHandle, true); } catch(e) { useFolder = false; }
    if (!useFolder) {
      // Pasta configurada porém sem permissão (típico após recarregar a página).
      toast('⚠ Permissão da pasta "' + pdfDirHandle.name + '" não concedida. Reabrindo seletor…');
      try {
        const h = await window.showDirectoryPicker({ id: 'dopcar-pdf', mode: 'readwrite' });
        pdfDirHandle = h;
        try { await idbSet(IDB_KEY, h); } catch(e) {}
        updateFolderUI();
        useFolder = await verifyPerm(h, true);
      } catch(e) {
        if (e && e.name === 'AbortError') { toast('Geração de PDF cancelada.'); return; }
        useFolder = false;
      }
    }
  }
  toast('Gerando PDF…', 0);
  fitToPage();
  try {
    const pages = [document.getElementById('a4')];
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = pdf.internal.pageSize.getWidth();
    const H = pdf.internal.pageSize.getHeight();
    for (let i = 0; i < pages.length; i++) {
      const el = pages[i];
      if (!el || !el.innerHTML.trim()) continue;
      const canvas = await html2canvas(el, { scale: 2.5, useCORS: true, backgroundColor: '#ffffff', width: el.scrollWidth, height: el.scrollHeight });
      const img = canvas.toDataURL('image/jpeg', 0.93);
      const ih = (canvas.height * W) / canvas.width;
      if (i > 0) pdf.addPage();
      if (ih <= H) {
        pdf.addImage(img, 'JPEG', 0, 0, W, ih);
      } else {
        let y = 0;
        while (y < ih) { pdf.addImage(img, 'JPEG', 0, -y, W, ih); y += H; if (y < ih) pdf.addPage(); }
      }
    }
    const fn = `DopCar_${(gv('f-nome')||'Laudo').toUpperCase().replace(/\s+/g,'_')}_${(gv('f-data')||'').replace(/-/g,'')}.pdf`;
    if (useFolder) {
      try {
        const blob = pdf.output('blob');
        const fh = await pdfDirHandle.getFileHandle(fn, { create: true });
        const w = await fh.createWritable();
        await w.write(blob);
        await w.close();
        toast('✓ Salvo em ' + pdfDirHandle.name + ': ' + fn);
        return;
      } catch(e) {
        toast('Falha ao salvar na pasta — baixando: ' + e.message);
      }
    }
    pdf.save(fn);
    toast(pdfDirHandle ? ('⚠ Pasta indisponível — PDF baixado em Downloads: ' + fn) : ('✓ PDF: ' + fn));
  } catch(e) { toast('Erro: ' + e.message); }
}

function onImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      const bank = getBank();
      // Support single record or array of records
      const records = Array.isArray(data) ? data : [data];
      let imported = 0;
      records.forEach(p => {
        if (!p.id) p.id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
        const exists = bank.findIndex(b => b.id === p.id);
        if (exists >= 0) bank[exists] = p; else bank.unshift(p);
        imported++;
      });
      svBank(bank);
      renderBank();
      toast(`✓ Importado(s) ${imported} registro(s)`);
    } catch (err) {
      toast('Erro ao importar: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = ''; // reset
}

// Arrow nav in velocity inputs — Up/Down moves between rows, Left/Right moves between columns
document.addEventListener('keydown', e => {

  const act = document.activeElement;
  if (!act || !act.classList.contains('vi')) return;
  e.preventDefault();
  const all = [...document.querySelectorAll('.vi:not([readonly])')];
  const idx = all.indexOf(act);
  if (idx < 0) return;
  let nx;
  if (e.key === 'ArrowDown') nx = all[idx + 1];
  else if (e.key === 'ArrowUp') nx = all[idx - 1];
  else if (e.key === 'ArrowRight') nx = all[idx + 1];
  else if (e.key === 'ArrowLeft') nx = all[idx - 1];
  if (nx) nx.focus();
});

// Preview zoom — eco style (manual ± control)
let _zoom = 0.62;
function applyZoom() {
  const pg = document.getElementById('pages');
  if (!pg) return;
  pg.style.transform = `scale(${_zoom})`;
  // Compensate margin for scaled children
  const h1 = (document.getElementById('a4')||{}).scrollHeight || 0;
  const totalH = h1;
  pg.style.marginBottom = `${(totalH * _zoom - totalH)}px`;
}
function zoomInc() { _zoom = Math.min(1, _zoom + 0.08); applyZoom(); }
function zoomDec() { _zoom = Math.max(0.30, _zoom - 0.08); applyZoom(); }
function zoom() { applyZoom(); }  // backwards-compat alias
window.addEventListener('resize', () => {
  // auto-fit to preview width if pages exist
  const pane = document.querySelector('.preview-pane');
  if (pane) {
    const fit = Math.min(1, (pane.clientWidth - 50) / 794);
    if (Math.abs(fit - _zoom) > 0.02) { _zoom = fit; applyZoom(); }
  }
});

// INIT
/* ════════════════════════════════════════════════════════════
   AUTOTESTE DO MOTOR CLÍNICO (regressão silenciosa)
   Rodar: abrir com #test na URL, ou chamar runSelfTests() no console.
   ════════════════════════════════════════════════════════════ */
function runSelfTests() {
  const R = [];
  const eq = (name, got, exp) => R.push({ name, got: String(got), exp: String(exp), ok: String(got) === String(exp) });
  const imt = v => { const c = RE.classIMT(v); return c ? c.grade : 'null'; };
  // EMI / classIMT — fronteiras
  eq('EMI 0,89 → normal', imt(0.89), 'normal');
  eq('EMI 0,90 → espessamento', imt(0.90), 'espes');
  eq('EMI 1,19 → espessamento', imt(1.19), 'espes');
  eq('EMI 1,20 → focal', imt(1.20), 'focal');
  eq('EMI 1,50 → focal', imt(1.50), 'focal');
  eq('EMI 1,51 → placa', imt(1.51), 'placa');
  // Estenose ACI — critérios IAC (SRU modificado)
  const g = (psv, edv, ratio, plac, man) => { const r = RE.stenoseACI(psv, edv, ratio, plac, man); return r ? r.grade : 'null'; };
  eq('ACI PSV150 s/placa r1,5 → normal', g(150, 30, 1.5, false), 'normal');
  eq('ACI PSV150 c/placa → <50%', g(150, 30, 1.5, true), 'lt50');
  eq('ACI PSV150 r2,2 → 50–69% (nota IAC)', g(150, 40, 2.2, false), '50_69');
  eq('ACI PSV179 → normal', g(179, 30, 1.2, false), 'normal');
  eq('ACI PSV180 → 50–69%', g(180, 50, 2.5, false), '50_69');
  eq('ACI PSV230 → 50–69%', g(230, 80, 3.0, false), '50_69');
  eq('ACI PSV231 → ≥70%', g(231, 80, 3.0, false), 'gte70');
  eq('ACI razão4,1 → ≥70%', g(120, 30, 4.1, true), 'gte70');
  eq('ACI EDV101 → ≥70%', g(120, 101, 1.5, true), 'gte70');
  eq('ACI manual oclusão', g(90, 10, NaN, false, 'oclusao'), 'oclusao');
  eq('ACI manual suboclusão', g(90, 10, NaN, false, 'suboclusao'), 'suboclusao');
  // Vertebral
  const v = f => { const c = RE.classVert(f); return c ? c.grade : 'null'; };
  eq('Vert. anterógrado → normal', v('anterogrado'), 'normal');
  eq('Vert. alternante → roubo parcial', v('alternante'), 'parcial');
  eq('Vert. retrógrado → roubo completo', v('retrogrado'), 'completo');
  // Conclusão em estado vazio → frase padrão
  const empty = { vel: {}, achados: {}, bifConcl: {}, comments: [] };
  eq('Conclusão vazia → frase padrão', RE.buildConcl(empty).startsWith('Exame Doppler das artérias'), 'true');
  const fail = R.filter(r => !r.ok).length;
  return { total: R.length, fail, results: R };
}

function showSelfTests() {
  const { total, fail, results } = runSelfTests();
  const rows = results.map(r =>
    `<tr style="background:${r.ok ? 'rgba(63,191,106,.12)' : 'rgba(232,85,78,.22)'}">
       <td style="padding:3px 8px">${r.ok ? '✓' : '✗'}</td>
       <td style="padding:3px 8px">${r.name}</td>
       <td style="padding:3px 8px;color:#9aa">${r.got}${r.ok ? '' : ' (esp. ' + r.exp + ')'}</td>
     </tr>`).join('');
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:99999;overflow:auto;padding:24px;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#e8e8e8';
  ov.innerHTML = `<div style="max-width:720px;margin:0 auto">
    <h2 style="color:${fail ? '#e8554e' : '#3fbf6a'};margin:0 0 12px">Autoteste do motor clínico — ${total - fail}/${total} OK${fail ? ' · ' + fail + ' FALHA(S)' : ' ✓'}</h2>
    <table style="width:100%;border-collapse:collapse">${rows}</table>
    <button onclick="this.closest('div').parentNode.remove()" style="margin-top:16px;padding:8px 18px;cursor:pointer">Fechar</button>
  </div>`;
  document.body.appendChild(ov);
  return { total, fail };
}
try { window.runSelfTests = runSelfTests; window.showSelfTests = showSelfTests; } catch(_) {}

document.addEventListener('DOMContentLoaded', () => {
  sv('f-data', new Date().toISOString().split('T')[0]);
  if (!(window.SpeechRecognition || window.webkitSpeechRecognition)) document.body.classList.add('no-voice');
  buildSVG();
  render();
  restoreFolder();
  if (location.hash === '#test') setTimeout(showSelfTests, 300);
  setTimeout(zoom, 120);
});
</script>
